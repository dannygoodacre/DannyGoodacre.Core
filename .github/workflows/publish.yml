name: Publish NuGet Package

on:
    push:
        branches: [ main ]

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            packages: write
            contents: read

        steps:
            - uses: actions/checkout@v6

            - name: Setup .NET
              uses: actions/setup-dotnet@v5
              with:
                dotnet-version: '10.0.x'

            - name: Pack
              run: |
                dotnet pack src/DannyGoodacre.Primitives/DannyGoodacre.Primitives.csproj \
                --configuration Release \
                --output ${{ github.workspace }}/nupkg

                dotnet pack src/DannyGoodacre.Cqrs/DannyGoodacre.Cqrs.csproj \
                --configuration Release \
                --output ${{ github.workspace }}/nupkg
                
                dotnet pack src/DannyGoodacre.Testing/DannyGoodacre.Testing.csproj \
                --configuration Release \
                --output ${{ github.workspace }}/nupkg
                
                dotnet pack src/DannyGoodacre.Cqrs.Testing/DannyGoodacre.Cqrs.Testing.csproj \
                --configuration Release \
                --output ${{ github.workspace }}/nupkg

            - name: Push to GitHub Packages
              run: |
                dotnet nuget push ./nupkg/*.nupkg \
                --api-key ${{ secrets.GITHUB_TOKEN }} \
                --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
                --skip-duplicate
